<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHIRO ERP - Inventario</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-logo">JHIRO</div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html" data-page="dashboard">📊 Dashboard</a></li>
        <li><a href="inventario.html" class="active" data-page="inventario">📦 Inventario</a></li>
        <li><a href="compras.html" data-page="compras">🛒 Compras</a></li>
        <li><a href="ventas.html" data-page="ventas">💰 Ventas</a></li>
        <li><a href="contabilidad.html" data-page="contabilidad">📑 Contabilidad</a></li>
        <li><a href="costeo-importaciones.html" class="active" data-page="costeo">📈 Costeo Import.</a></li>
      </ul>
      <div class="sidebar-user">
        <strong id="userDisplay">Admin</strong>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <h2 class="header-title">Inventario</h2>
        </div>
        <div class="header-controls">
          <button class="theme-toggle" id="themeToggle">🌙 Oscuro</button>
        </div>
      </header>

      <main class="content">
        <h1 class="page-title">Módulo Inventario</h1>

        <div class="tab-buttons" id="inventarioTabs">
          <button class="tab-btn active" data-tab="productos">Productos</button>
          <button class="tab-btn" data-tab="lotes">Lotes</button>
          <button class="tab-btn" data-tab="resumen">Resumen Stock</button>
        </div>

        <!-- TAB PRODUCTOS -->
        <div id="tab-productos" class="tab-content active">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Productos</h3>
              <button class="btn btn-primary btn-small" onclick="openModal('modal-nuevo-producto')">+ Nuevo Producto</button>
            </div>
            <div id="tabla-productos" class="table-container">
              <p style="text-align: center; color: var(--text-secondary); padding: 20px;">Cargando...</p>
            </div>
          </div>
        </div>

        <!-- TAB LOTES -->
        <div id="tab-lotes" class="tab-content">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Lotes</h3>
              <button class="btn btn-primary btn-small" onclick="abrirModalLote()">+ Nuevo Lote</button>
            </div>
            <div id="tabla-lotes" class="table-container">
              <p style="text-align: center; color: var(--text-secondary); padding: 20px;">Cargando...</p>
            </div>
          </div>
        </div>

        <!-- TAB RESUMEN -->
        <div id="tab-resumen" class="tab-content">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Resumen de Stock</h3>
            </div>
            <div id="tabla-resumen" class="table-container">
              <p style="text-align: center; color: var(--text-secondary); padding: 20px;">Cargando...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL NUEVO PRODUCTO -->
  <div id="modal-nuevo-producto" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nuevo Producto</h3>
        <button class="modal-close" onclick="closeModal('modal-nuevo-producto')">✕</button>
      </div>
      <form id="formNewProducto">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" id="prodNombre" placeholder="Ej: Laptop HP 15.6" required>
        </div>
        
        <div class="form-group">
          <label>SKU *</label>
          <input type="text" id="prodSKU" placeholder="Ej: LP-HP-001" required>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea id="prodDescripcion" placeholder="Detalles del producto" style="min-height: 80px;"></textarea>
        </div>

        <div class="form-group">
          <label>Categoría</label>
          <input type="text" id="prodCategoria" placeholder="Ej: Electrónica">
        </div>

        <div class="form-group">
          <label>Activo</label>
          <select id="prodActivo">
            <option value="true" selected>Sí</option>
            <option value="false">No</option>
          </select>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-nuevo-producto')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL NUEVO LOTE -->
  <div id="modal-nuevo-lote" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nuevo Lote</h3>
        <button class="modal-close" onclick="closeModal('modal-nuevo-lote')">✕</button>
      </div>
      <form id="formNewLote">
        <div class="form-group">
          <label>Producto *</label>
          <select id="loteProducto" required>
            <option value="">-- Selecciona --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Número de Lote *</label>
          <input type="text" id="loteNumero" placeholder="Ej: LOTE-001-2025" required>
        </div>

        <div class="form-group">
          <label>Cantidad Inicial</label>
          <input type="number" id="loteStock" placeholder="0" min="1" required>
        </div>

        <div class="form-group">
          <label>Costo Unitario</label>
          <input type="number" id="loteCosto" placeholder="0.00" step="0.01" required>
        </div>

        <div class="form-group">
          <label>Costo de Destino (Flete, Impuestos)</label>
          <input type="number" id="loteDestino" placeholder="0.00" step="0.01" value="0">
        </div>

        <div class="form-group">
          <label>Fecha de Vencimiento *</label>
          <input type="date" id="loteVencimiento" required>
        </div>

        <div class="form-group">
          <label>Usuario Ingreso</label>
          <input type="text" id="loteUsuario" disabled>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-nuevo-lote')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarLote()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR LOTE -->
  <div id="modal-editar-lote" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Editar Lote</h3>
        <button class="modal-close" onclick="closeModal('modal-editar-lote')">✕</button>
      </div>
      <form id="formEditLote">
        <div class="form-group">
          <label>Número de Lote</label>
          <input type="text" id="editLoteNumero" disabled>
        </div>

        <div class="form-group">
          <label>Stock Actual *</label>
          <input type="number" id="editLoteStock" min="0" required>
        </div>

        <div class="form-group">
          <label>Costo Unitario *</label>
          <input type="number" id="editLoteCosto" step="0.01" required>
        </div>

        <div class="form-group">
          <label>Costo de Destino</label>
          <input type="number" id="editLoteDestino" step="0.01">
        </div>

        <div class="form-group">
          <label>Fecha de Vencimiento *</label>
          <input type="date" id="editLoteVencimiento" required>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-editar-lote')">Cancelar</button>
        <button class="btn btn-primary" onclick="actualizarLote()">Guardar</button>
      </div>
    </div>
  </div>
  <script type="module" src="assets/js/config.js"></script>
  <script type="module" src="assets/js/supabase-client.js"></script>
  <script type="module" src="assets/js/auth-supabase.js"></script>
  <script type="module" src="assets/js/auth-init.js"></script>
  <script type="module" src="assets/js/supabase-data.js"></script>
  <script type="module" src="assets/js/helpers.js"></script>
  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/inventario.js"></script>
</body>
</html>
