<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHIRO ERP - Ventas</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-logo">JHIRO</div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html" data-page="dashboard">📊 Dashboard</a></li>
        <li><a href="inventario.html" class="active" data-page="inventario">📦 Inventario</a></li>
        <li><a href="compras.html" data-page="compras">🛒 Compras</a></li>
        <li><a href="ventas.html" class="active" data-page="ventas">💰 Ventas</a></li>
        <li><a href="contabilidad.html" data-page="contabilidad">📑 Contabilidad</a></li>
        <li><a href="costeo-importaciones.html" class="active" data-page="costeo">📈 Costeo Import.</a></li>
      </ul>
      <div class="sidebar-user">
        <strong id="userDisplay">Admin</strong>
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <h2 class="header-title">Ventas</h2>
        </div>
        <div class="header-controls">
          <button class="theme-toggle" id="themeToggle">🌙 Oscuro</button>
        </div>
      </header>

      <main class="content">
        <h1 class="page-title">Módulo Ventas</h1>

        <div class="tab-buttons" id="ventasTabs">
          <button class="tab-btn active" data-tab="cotizaciones">Cotizaciones</button>
          <button class="tab-btn" data-tab="clientes">Clientes</button>
        </div>

        <div id="tab-cotizaciones" class="tab-content active">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Cotizaciones de Venta</h3>
              <button class="btn btn-primary btn-small" onclick="openModal('modal-nueva-cot')">+ Nueva</button>
            </div>
            <div id="tabla-cot" class="table-container">
              <p style="text-align: center; color: var(--text-secondary);">Cargando...</p>
            </div>
          </div>
        </div>

        <div id="tab-clientes" class="tab-content">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Clientes</h3>
              <button class="btn btn-primary btn-small" onclick="openModal('modal-nuevo-cliente')">+ Nuevo</button>
            </div>
            <div id="tabla-clientes" class="table-container">
              <p style="text-align: center; color: var(--text-secondary);">Cargando...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL NUEVA COTIZACIÓN -->
  <div id="modal-nueva-cot" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nueva Cotización</h3>
        <button class="modal-close" onclick="closeModal('modal-nueva-cot')">✕</button>
      </div>
      <form id="formNewCot">
        <div class="form-group">
          <label>Cliente *</label>
          <select id="cotCliente" required>
            <option value="">-- Selecciona --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Lote *</label>
          <select id="cotLote" required>
            <option value="">-- Selecciona --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Cantidad *</label>
          <input type="number" id="cotCantidad" placeholder="0" min="1" required>
        </div>

        <div class="form-group">
          <label>Precio Venta *</label>
          <input type="number" id="cotPrecio" placeholder="0.00" step="0.01" required>
        </div>

        <div class="form-group">
          <label>IGV (%)</label>
          <select id="cotIGV">
            <option value="18" selected>18%</option>
            <option value="10">10%</option>
            <option value="0">Exonerado</option>
          </select>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-nueva-cot')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarCotizacion()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL NUEVO CLIENTE -->
  <div id="modal-nuevo-cliente" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nuevo Cliente</h3>
        <button class="modal-close" onclick="closeModal('modal-nuevo-cliente')">✕</button>
      </div>
      <form id="formNewCliente">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" id="cliNombre" required>
        </div>
        <div class="form-group">
          <label>RUC *</label>
          <input type="text" id="cliRUC" placeholder="11 dígitos" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cliEmail">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="cliPhone">
        </div>
        <div class="form-group">
          <label>Moneda</label>
          <select id="cliMoneda">
            <option value="PEN" selected>PEN</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-nuevo-cliente')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarCliente()">Guardar</button>
      </div>
    </div>
  </div>
  <script type="module" src="assets/js/config.js"></script>
  <script type="module" src="assets/js/supabase-client.js"></script>
  <script type="module" src="assets/js/auth-supabase.js"></script>
  <script type="module" src="assets/js/auth-init.js"></script>
  <script type="module" src="assets/js/supabase-data.js"></script>
  <script type="module" src="assets/js/helpers.js"></script>
  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/ventas.js"></script>
</body>
</html>
