<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHIRO ERP - Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>JHIRO ERP</h1>
        <p>Sistema Contable para Importadoras</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input 
            type="text" 
            id="username" 
            placeholder="admin" 
            autocomplete="off"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            autocomplete="off"
            required
          >
        </div>

        <button type="submit" class="btn btn-login">Ingresar</button>
      </form>

      <div class="login-footer">
        <p>Credenciales por defecto: <strong>admin / admin</strong></p>
      </div>

      <div id="loginError" class="login-error" style="display: none;"></div>
    </div>
  </div>
  <script type="module" src="assets/js/config.js"></script>
  <script type="module" src="assets/js/supabase-client.js"></script>
  <script type="module" src="assets/js/auth-supabase.js"></script>
  <script type="module" src="assets/js/auth-init.js"></script>
  <script type="module" src="assets/js/helpers.js"></script>
  <script>
    // Esperar a que auth-init cargue las funciones globales
    function handleLoginSubmit(e) {
      e.preventDefault()
      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const errorDiv = document.getElementById('loginError')
      
      // Limpiar error anterior
      errorDiv.style.display = 'none'
      errorDiv.textContent = ''
      
      // Llamar a la función global login (disponible después de auth-init)
      if (typeof window.login !== 'function') {
        console.error('Función login no disponible')
        errorDiv.textContent = 'Error al cargar el sistema de autenticación'
        errorDiv.style.display = 'block'
        return
      }
      
      // Ejecutar login
      window.login(username, password).then(success => {
        if (success) {
          // Login exitoso
          window.location.href = 'dashboard.html'
        } else {
          // Mostrar error
          errorDiv.textContent = 'Usuario o contraseña incorrectos'
          errorDiv.style.display = 'block'
          document.getElementById('password').value = ''
        }
      }).catch(error => {
        console.error('Error en login:', error)
        errorDiv.textContent = 'Error al iniciar sesión. Intenta de nuevo.'
        errorDiv.style.display = 'block'
      })
    }
    
    // Agregar evento cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm')
      if (form) {
        form.addEventListener('submit', handleLoginSubmit)
      }
    })
  </script>
</body>
</html>
